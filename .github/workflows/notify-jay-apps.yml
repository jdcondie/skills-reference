name: Notify jay-apps

on:
  push:
    branches: [main]
    paths:
      - 'skills-reference.html'
      - '.github/workflows/notify-jay-apps.yml'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger jay-apps rebuild
        env:
          PAT: ${{ secrets.JAY_APPS_DISPATCH_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jdcondie/jay-apps/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}')
          echo "HTTP $STATUS"
          cat /tmp/resp
          test "$STATUS" = "204"
